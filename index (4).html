<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirDraw — Draw with your finger in the air</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #ff2d9b;
      --cyan: #00eaff;
      --green: #aaff00;
      --amber: #ffaa00;
      --white: #ffffff;
      --bg: #050508;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── LANDING SCREEN ── */
    #landing {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: var(--bg);
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    #landing.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .landing-glow {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,45,155,0.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: -2px;
      background: linear-gradient(135deg, #ff2d9b, #00eaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }

    .tagline {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
      position: relative;
      z-index: 1;
    }

    .how-to {
      display: flex;
      gap: 2rem;
      margin: 2.5rem 0;
      position: relative;
      z-index: 1;
    }
    .how-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      max-width: 100px;
    }
    .how-icon {
      font-size: 2rem;
      filter: drop-shadow(0 0 8px rgba(255,45,155,0.5));
    }

    .start-btn {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #ff2d9b, #c800ff);
      border: none;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.05em;
      padding: 1rem 2.5rem;
      border-radius: 100px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 30px rgba(255,45,155,0.4);
    }
    .start-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 0 50px rgba(255,45,155,0.6);
    }

    /* ── APP SCREEN ── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    #cam-wrapper {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    #webcam {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.72;
    }

    #draw-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }

    /* ── STATUS PILL ── */
    #status-pill {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border: 0.5px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    .dot-indicator.active { background: var(--pink); box-shadow: 0 0 6px var(--pink); }
    .dot-indicator.drawing { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); animation: blink 0.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── TOOLBAR ── */
    #toolbar {
      background: rgba(5,5,8,0.85);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }
    .color-btn::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .color-btn.active::after { border-color: rgba(255,255,255,0.6); }
    .color-btn:hover { transform: scale(1.15); }

    .sep { width: 1px; height: 28px; background: var(--border); }

    .tool-btn {
      background: var(--surface);
      border: 0.5px solid var(--border);
      color: rgba(255,255,255,0.8);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 7px 16px;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      white-space: nowrap;
    }
    .tool-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.03); }
    .tool-btn:active { transform: scale(0.97); }

    .size-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 80px;
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--pink);
      cursor: pointer;
      box-shadow: 0 0 6px var(--pink);
    }

    /* ── CURSOR ── */
    #cursor-dot {
      position: absolute;
      width: 20px; height: 20px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s;
      z-index: 20;
      display: none;
    }
  </style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="landing-glow"></div>
  <div class="logo">AirDraw</div>
  <div class="tagline">draw in the air with your finger</div>
  <div class="how-to">
    <div class="how-step">
      <span class="how-icon">☝️</span>
      <span>Point index finger up to draw</span>
    </div>
    <div class="how-step">
      <span class="how-icon">✊</span>
      <span>Make a fist to pause</span>
    </div>
    <div class="how-step">
      <span class="how-icon">🎨</span>
      <span>Pick colors below</span>
    </div>
  </div>
  <button class="start-btn" id="start-btn">Start Drawing →</button>
</div>

<!-- APP -->
<div id="app">
  <div id="cam-wrapper">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="draw-canvas"></canvas>
    <div id="cursor-dot"></div>
    <div id="status-pill">
      <div class="dot-indicator" id="dot"></div>
      <span id="status-text">Starting camera…</span>
    </div>
  </div>

  <div id="toolbar">
    <div class="color-btn active" style="background:#ff2d9b;box-shadow:0 0 8px #ff2d9b44" data-color="#ff2d9b" data-shadow="#ff2d9b"></div>
    <div class="color-btn" style="background:#00eaff;box-shadow:0 0 8px #00eaff44" data-color="#00eaff" data-shadow="#00eaff"></div>
    <div class="color-btn" style="background:#c800ff;box-shadow:0 0 8px #c800ff44" data-color="#c800ff" data-shadow="#c800ff"></div>
    <div class="color-btn" style="background:#aaff00;box-shadow:0 0 8px #aaff0044" data-color="#aaff00" data-shadow="#aaff00"></div>
    <div class="color-btn" style="background:#ffaa00;box-shadow:0 0 8px #ffaa0044" data-color="#ffaa00" data-shadow="#ffaa00"></div>
    <div class="color-btn" style="background:#ffffff;box-shadow:0 0 8px #ffffff33" data-color="#ffffff" data-shadow="#ffffff"></div>
    <div class="sep"></div>
    <div class="size-wrap">
      <span>Size</span>
      <input type="range" id="size-slider" min="1" max="5" value="3" step="1">
    </div>
    <div class="sep"></div>
    <button class="tool-btn" id="clear-btn">✕ Clear</button>
    <button class="tool-btn" id="save-btn">↓ Save</button>
  </div>
</div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('status-text');
const dot = document.getElementById('dot');
const cursorDot = document.getElementById('cursor-dot');
const landing = document.getElementById('landing');
const sizeSlider = document.getElementById('size-slider');

let color = '#ff2d9b';
let brushSize = 3;
let trails = [];
let currentTrail = null;
let lastX = null, lastY = null;
let camStarted = false;

// Color buttons
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    color = btn.dataset.color;
    cursorDot.style.background = color;
    cursorDot.style.boxShadow = `0 0 12px ${color}`;
  });
});

sizeSlider.addEventListener('input', () => { brushSize = +sizeSlider.value; });

document.getElementById('clear-btn').addEventListener('click', () => {
  trails = [];
  currentTrail = null;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});

document.getElementById('save-btn').addEventListener('click', () => {
  const merge = document.createElement('canvas');
  merge.width = canvas.width; merge.height = canvas.height;
  const mCtx = merge.getContext('2d');
  mCtx.save();
  mCtx.translate(merge.width, 0);
  mCtx.scale(-1, 1);
  mCtx.drawImage(video, 0, 0, merge.width, merge.height);
  mCtx.restore();
  mCtx.drawImage(canvas, 0, 0);
  const a = document.createElement('a');
  a.href = merge.toDataURL('image/png');
  a.download = 'airdraw.png';
  a.click();
});

// Start button
document.getElementById('start-btn').addEventListener('click', () => {
  landing.classList.add('hidden');
  if (!camStarted) startCamera();
});

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  redrawAll();
}

function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16),
    parseInt(hex.slice(3,5),16),
    parseInt(hex.slice(5,7),16)
  ];
}

function drawGlowLine(x1,y1,x2,y2,col,size) {
  const [r,g,b] = hexToRgb(col);
  const s = size * 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // outer glow
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(${r},${g},${b},0.12)`;
  ctx.lineWidth = s * 6; ctx.stroke();
  // mid glow
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(${r},${g},${b},0.3)`;
  ctx.lineWidth = s * 3; ctx.stroke();
  // core
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(${r},${g},${b},1)`;
  ctx.lineWidth = s; ctx.stroke();
  // highlight
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,255,255,0.75)`;
  ctx.lineWidth = Math.max(0.5, s * 0.3); ctx.stroke();
}

function redrawAll() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (const trail of trails) {
    for (let i = 1; i < trail.points.length; i++) {
      const p = trail.points[i-1], q = trail.points[i];
      drawGlowLine(p.x,p.y,q.x,q.y,trail.color,trail.size);
    }
  }
}

// Continuous render loop
let cursorX = null, cursorY = null, isDrawing = false;
function renderLoop() {
  redrawAll();
  if (cursorX !== null) {
    const [r,g,b] = hexToRgb(color);
    ctx.beginPath();
    ctx.arc(cursorX, cursorY, 14, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cursorX, cursorY, 4, 0, Math.PI*2);
    ctx.fillStyle = isDrawing ? color : 'rgba(255,255,255,0.4)';
    ctx.fill();
  }
  requestAnimationFrame(renderLoop);
}
renderLoop();

function isIndexUp(lm) {
  return lm[8].y < lm[6].y && lm[12].y > lm[10].y;
}

function startCamera() {
  camStarted = true;
  navigator.mediaDevices.getUserMedia({ video: { facingMode:'user', width:1280, height:720 }, audio:false })
    .then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.75, minTrackingConfidence:0.65 });
        hands.onResults(onResults);

        const camera = new Camera(video, {
          onFrame: async () => { await hands.send({ image: video }); },
          width: 1280, height: 720
        });
        camera.start();
        statusText.textContent = 'Show your hand';
        dot.className = 'dot-indicator';
      };
    })
    .catch(() => {
      statusText.textContent = 'Camera access denied';
    });
}

function onResults(results) {
  const W = canvas.width, H = canvas.height;
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0];
    const tip = lm[8];
    const x = (1 - tip.x) * W;
    const y = tip.y * H;
    cursorX = x; cursorY = y;

    if (isIndexUp(lm)) {
      isDrawing = true;
      dot.className = 'dot-indicator drawing';
      statusText.textContent = 'Drawing ✏️';
      if (lastX !== null) {
        if (!currentTrail) {
          currentTrail = { points:[{x:lastX,y:lastY}], color, size: brushSize };
          trails.push(currentTrail);
        }
        currentTrail.points.push({x,y});
        drawGlowLine(lastX,lastY,x,y,color,brushSize);
      } else {
        currentTrail = { points:[{x,y}], color, size: brushSize };
        trails.push(currentTrail);
      }
      lastX = x; lastY = y;
    } else {
      isDrawing = false;
      dot.className = 'dot-indicator active';
      statusText.textContent = 'Hand detected ✋';
      lastX = null; lastY = null;
      currentTrail = null;
    }
  } else {
    cursorX = null; cursorY = null;
    isDrawing = false;
    dot.className = 'dot-indicator';
    statusText.textContent = 'Show your hand';
    lastX = null; lastY = null;
    currentTrail = null;
  }
}
</script>
</body>
</html>
